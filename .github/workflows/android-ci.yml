name: Android CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Test, lint, and build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out sources
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Test, lint, and build APKs
        run: ./gradlew testDebugUnitTest lintDebug assembleDebug assembleRelease --stacktrace

      - name: Upload APKs
        uses: actions/upload-artifact@v6
        with:
          name: opentv-apks-${{ github.sha }}
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload verification reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: opentv-reports-${{ github.sha }}
          path: |
            app/build/reports/tests/
            app/build/reports/lint-results-*.html
            app/build/reports/lint-results-*.xml
            app/build/reports/lint-results-*.sarif
          if-no-files-found: ignore
          retention-days: 14
